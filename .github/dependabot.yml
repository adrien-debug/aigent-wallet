version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      next:
        patterns: ["next", "eslint-config-next"]
      radix:
        patterns: ["@radix-ui/*"]
      types:
        patterns: ["@types/*"]
      vitest:
        patterns: ["vitest", "@vitest/*", "vite"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
